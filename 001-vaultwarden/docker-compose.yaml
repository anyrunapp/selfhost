name: ${APP_ID}-${APP_SLUG}

services:
  db:
    image: postgres:${POSTGRES_TAG}
    container_name: ${APP_ID}-${APP_SLUG}-db
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TZ: ${TZ}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      # PORT_1:仅回环暴露,方便本机 psql / 备份;不需要就整段注释掉
      - "127.0.0.1:${PORT_1}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  vaultwarden:
    image: vaultwarden/server:${VAULTWARDEN_TAG}
    container_name: ${APP_ID}-${APP_SLUG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DOMAIN: ${DOMAIN}
      SIGNUPS_ALLOWED: ${SIGNUPS_ALLOWED}
      INVITATIONS_ALLOWED: ${INVITATIONS_ALLOWED}
      SIGNUPS_DOMAINS_WHITELIST: ${SIGNUPS_DOMAINS_WHITELIST}
      WEB_VAULT_ENABLED: ${WEB_VAULT_ENABLED}
      SHOW_PASSWORD_HINT: "false"
      ROCKET_ADDRESS: 0.0.0.0
      ROCKET_PORT: 80
      LOG_LEVEL: ${LOG_LEVEL}
      TZ: ${TZ}
      # SMTP(不用就留空)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURITY: ${SMTP_SECURITY}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      # 推送到客户端
      PUSH_ENABLED: ${PUSH_ENABLED}
      PUSH_INSTALLATION_ID: ${PUSH_INSTALLATION_ID}
      PUSH_INSTALLATION_KEY: ${PUSH_INSTALLATION_KEY}
      # 如果是 EU 区域再加:
      # PUSH_RELAY_URI: ${PUSH_RELAY_URI}
      # PUSH_IDENTITY_URI: ${PUSH_IDENTITY_URI}
      # 启用yubikey
      YUBICO_CLIENT_ID: ${YUBICO_CLIENT_ID}
      YUBICO_SECRET_KEY: ${YUBICO_SECRET_KEY}
      # 启用 Duo，企业使用才需要
      # DUO_IKEY: ${DUO_IKEY}
      # DUO_SKEY: ${DUO_SKEY}
      # DUO_HOST: ${DUO_HOST}
      # 开启后可以存 ssh 密钥
      EXPERIMENTAL_CLIENT_FEATURE_FLAGS: ssh-key-vault-item,ssh-agent
    env_file:
      # ADMIN_TOKEN 单独放这里:env_file 的值不会被 compose 做 ${} 插值,
      # argon2 哈希里的 $ 可以原样写,不用转义
      - ./secrets.env
    volumes:
      - ./data/vaultwarden:/data
    ports:
      # PORT_0:HTTP 主端口,前面挂 Caddy/Nginx 反代 + TLS
      - "127.0.0.1:${PORT_0}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/alive || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
